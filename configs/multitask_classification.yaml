schema_version: "1.0.0"
run_name: chemberta_multitask_classification
split_track: coordinated_multitask
prepared_root: ../outputs/local/multitask/prepared

tasks:
  bbb_martins:
    endpoint_config: bbb_martins.yaml
    endpoint_id: bbb_martins
    tdc_name: BBB_Martins
    task_group: ADME
    task_type: binary_classification
    primary_metric: roc_auc
  herg_karim:
    endpoint_config: herg_karim.yaml
    endpoint_id: herg_karim
    tdc_name: herg
    task_group: Tox
    task_type: binary_classification
    primary_metric: roc_auc
  ames:
    endpoint_id: ames
    tdc_name: AMES
    task_group: Tox
    task_type: binary_classification
    primary_metric: roc_auc

split_files:
  train: train.csv
  validation: valid.csv
  test: test.csv

audit:
  enforce_exact_smiles_exclusion: true
  enforce_scaffold_exclusion: true
  fail_on_invalid_molecules: true
  fail_on_conflicting_labels: true
  fail_on_duplicates: true

training:
  random_seed: 42
  encoder_learning_rate: 2.0e-5
  head_learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  task_sampling: round_robin
  task_loss_weights:
    bbb_martins: 1.0
    herg_karim: 1.0
    ames: 1.0
