    task_type: regression
    source_row_count: 9982
    unique_canonical_structure_count: 9980
    target_definition: Aqueous solubility
    units: log mol/L
    recommended_transform: identity
    transform_rationale: AqSolDB target values are already logarithmic.
    missing_target_count: 0
    invalid_smiles_count: 2
    duplicate_group_count: 0
    conflicting_duplicate_group_count: 0
    target_distribution:
      min: -13.1719
      median: -2.6181734
      max: 2.1376816
      skew: -0.5516915
  ppbr_az:
    endpoint_id: ppbr_az
    tdc_name: PPBR_AZ
    task_group: ADME
    task_type: regression
    source_row_count: 1614
    alternate_tdc_benchmark_view_row_count: 1797
