schema_version: "1.0.0"
run_name: coordinated_multitask_regression_source_audit
split_track: coordinated_multitask_regression
pytdc_version: "0.3.9"
random_seed: 42
source_root: ../outputs/local/multitask_regression/prepared
output_root: ../outputs/local/multitask_regression/coordinated

split_fractions:
  train: 0.8
  validation: 0.1
  test: 0.1

source_files:
  raw: raw.csv

duplicate_policy:
  identical_continuous_labels: keep_first_deterministically
  distinct_continuous_labels: quarantine_entire_endpoint_structure_group

tasks:
  caco2_wang:
    endpoint_id: caco2_wang
    tdc_name: Caco2_Wang
    task_group: ADME
    task_type: regression
    source_row_count: 910
    unique_canonical_structure_count: 906
    target_definition: Caco-2 cell effective permeability
    units: TDC displays the physical unit as cm/s; distributed labels are consistent with log10 Papp
    recommended_transform: identity
    transform_rationale: Distributed target range and source convention are consistent with log10 Papp; do not apply an additional logarithm.
    missing_target_count: 0
    invalid_smiles_count: 0
    duplicate_group_count: 4
    conflicting_duplicate_group_count: 4
    target_distribution:
      min: -7.7600002
      median: -5.1312239
      max: -3.51
      skew: -0.6658070
  lipophilicity_astrazeneca:
    endpoint_id: lipophilicity_astrazeneca
    tdc_name: Lipophilicity_AstraZeneca
    task_group: ADME
    task_type: regression
    source_row_count: 4200
    unique_canonical_structure_count: 4200
    target_definition: Experimental molecular lipophilicity
    units: log-ratio
    recommended_transform: identity
    transform_rationale: The source target is already logarithmic.
    missing_target_count: 0
    invalid_smiles_count: 0
    duplicate_group_count: 0
    conflicting_duplicate_group_count: 0
