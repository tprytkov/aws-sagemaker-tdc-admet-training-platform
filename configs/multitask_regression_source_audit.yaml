    target_definition: Human plasma protein binding rate
    units: percent bound
    recommended_transform: identity
    transform_rationale: Use identity followed by train-only z-score for the frozen initial experiment.
    provenance_note: Use exactly the 1614 rows returned by installed PyTDC 0.3.9; do not merge or supplement records to match the separate 1797-row benchmark view.
    missing_target_count: 0
    invalid_smiles_count: 0
    duplicate_group_count: 0
    conflicting_duplicate_group_count: 0
    target_distribution:
      min: 11.18
      median: 95.43
      max: 99.95
      skew: -2.1323299
