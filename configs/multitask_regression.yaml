schema_version: "1.0.0"
run_name: chemberta_multitask_regression
split_track: coordinated_multitask_regression
prepared_root: ../outputs/local/multitask_regression/coordinated

tasks:
  caco2_wang:
    endpoint_id: caco2_wang
    tdc_name: Caco2_Wang
    task_type: regression
    target_definition: Caco-2 cell effective permeability
    units: TDC displays the physical unit as cm/s; distributed labels are consistent with log10 Papp
    target_transform: identity
    provenance_note: Distributed target range and source convention are consistent with log10 Papp; no additional logarithmic transform is applied.
  lipophilicity_astrazeneca:
    endpoint_id: lipophilicity_astrazeneca
    tdc_name: Lipophilicity_AstraZeneca
    task_type: regression
    target_definition: Experimental molecular lipophilicity
    units: log-ratio
    target_transform: identity
  solubility_aqsoldb:
    endpoint_id: solubility_aqsoldb
    tdc_name: Solubility_AqSolDB
    task_type: regression
    target_definition: Aqueous solubility
    units: log mol/L
    target_transform: identity
    provenance_note: Target is already LogS; do not apply another logarithm.
  ppbr_az:
    endpoint_id: ppbr_az
    tdc_name: PPBR_AZ
    task_type: regression
    target_definition: Human plasma protein binding rate
    units: percent bound
    target_transform: identity
    provenance_note: Use exactly the 1614 rows returned by installed PyTDC 0.3.9; a separate TDC benchmark view reports 1797, and no records are merged or supplemented to match it.
  vdss_lombardo:
    endpoint_id: vdss_lombardo
    tdc_name: VDss_Lombardo
    task_type: regression
    target_definition: Human volume of distribution at steady state
    units: L/kg
    target_transform: log10

split_files:
  train: train.csv
  validation: valid.csv
  test: test.csv

training:
  random_seed: 42
  encoder_learning_rate: 2.0e-5
  head_learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  task_sampling: round_robin
  loss: huber
  huber_delta: 1.0
  task_loss_weights:
    caco2_wang: 1.0
    lipophilicity_astrazeneca: 1.0
    solubility_aqsoldb: 1.0
    ppbr_az: 1.0
    vdss_lombardo: 1.0
  model_name_or_path: seyonec/ChemBERTa-zinc-base-v1
  model_revision: null
  pooling: masked_mean
  dropout: 0.15
  train_batch_size: 8
  evaluation_batch_size: 16
  max_sequence_length: 128
  max_steps: 3000
  evaluation_interval_steps: 100
  checkpoint_interval_steps: 100
  warmup_ratio: 0.1
  scheduler: linear_warmup_decay
  early_stopping_patience_evaluations: 5
  minimum_training_steps_before_stopping: 500
  mixed_precision: bf16
